spring.application.name=researchpaperfinder

# Spring Boot configuration
server.port=9090
server.servlet.context-path=/research-paper-finder

# API Configuration - arXiv (HTTPS - Free & Unlimited)
arxiv.api.base-url=https://export.arxiv.org/api/query
arxiv.api.timeout=30000

# Logging
logging.level.com.project=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.http.client=DEBUG

# Jackson
spring.jackson.default-property-inclusion=non_null
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# HTTP Client
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.client.timeout=30000
# API Timeouts & Retries
resttemplate.connect-timeout=10000
resttemplate.read-timeout=30000
resttemplate.max-retries=3
resttemplate.retry-delay=1000
